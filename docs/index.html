<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 行业每日简报 · hiwd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      background-color: #f5f5f5;
      color: #1a1a1a;
    }
    #logo {
      position: fixed; top: 15px; left: 15px; z-index: 9999;
      display: block; width: 100px; height: 100px;
      background-image: url('https://hiwd.com/img/logo.png');
      background-size: cover; background-repeat: no-repeat;
      outline: none; border: none;
    }
    #content {
      margin-top: 80px; margin-left: auto; margin-right: auto;
      width: 90%; max-width: 800px; padding: 30px;
      background-color: #fff; box-shadow: 0px 2px 4px rgba(0,0,0,.1);
      border-radius: 12px; margin-bottom: 30px;
    }
    h1 {
      position: relative; padding-left: 15px;
      font-weight: bold; font-size: 32px; color: #333; margin-top: 0;
    }
    h1::before {
      content: ""; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
      width: 4px; height: 26px; background-color: #00C2B3; border-radius: 2px;
    }
    p { line-height: 1.7; margin-top: 10px; margin-bottom: 16px; color: #333; }
    a { color: #008F84; text-decoration: none; transition: opacity .2s; }
    a:hover { opacity: .7; }
    code {
      font-family: "SF Mono", monospace; font-size: .85em;
      background: #f3f4f6; padding: .1em .35em; border-radius: 4px;
    }
    #footer {
      text-align: center; margin-top: 10px; padding: 20px;
      font-size: 12px; color: #999;
    }
    @media (max-width: 1150px) {
      #logo { position: absolute !important; width: 80px; height: 80px; }
      #content { margin-top: 110px; }
    }
  </style>
</head>
<body>
  <a href="https://hiwd.com/" id="logo" aria-label="返回 hiwd 主站"></a>
  <div id="content">
    <h1>AI 行业每日简报</h1>
    <p>第一期简报将在 GitHub Actions 首次运行后自动生成。</p>
    <p>请先完成以下配置：</p>
    <p>① 在仓库 <strong>Settings → Secrets → Actions</strong> 中添加 <code>ANTHROPIC_API_KEY</code><br/>
       ② 进入 <strong>Actions → Daily AI Briefing → Run workflow</strong> 手动触发一次</p>
    <p>之后每天北京时间 08:30 自动更新。<br/>
       <a href="https://hiwd.com/">← 返回 hiwd 主站</a></p>
  </div>
  <div id="footer">© 2026 hiwd · All rights reserved. · <a href="https://hiwd.com/">hiwd.com</a></div>
</body>
</html>
