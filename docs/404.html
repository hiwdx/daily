<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · 页面未找到 · hiwd</title>
  <meta name="description" content="页面未找到，即将跳转到 daily.hiwd.com" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
  <link rel="alternate" type="application/rss+xml" title="hiwd daily · AI 行业每日简报" href="/rss.xml" />
  <script src="/theme.js?v=20260704-1"></script>
  <link rel="stylesheet" type="text/css" href="/style.css?v=20260707-1" />
  <style>
    .error-code {
      font-size: 88px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin: 10px 0 0;
      letter-spacing: -2px;
    }
    .error-msg {
      font-size: 18px;
      color: var(--author-text);
      margin-top: 6px;
    }
    .error-sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 18px;
    }
    .countdown {
      color: var(--accent);
      font-weight: 600;
    }
    .error-actions {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .error-actions a {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .error-actions a.primary {
      background: var(--accent);
      color: #fff;
    }
    .error-actions a.ghost {
      background: transparent;
      color: var(--link);
      border: 1px solid var(--dash-border);
    }
    .error-actions a:hover {
      opacity: 0.85;
    }
    @media (max-width: 767px) {
      .error-code {
        font-size: 64px;
      }
      .error-msg {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <a href="https://hiwd.com/" id="logo" aria-label="返回 hiwd 主站"></a>

  <div id="content">
    <div class="hero">
      <div class="hero-meta"><a href="https://hiwd.com/">hiwd</a><span class="hero-divider">/</span><a href="/">daily</a><span class="hero-date">404</span></div>
      <p class="error-code">404</p>
      <h1>页面未找到</h1>
    </div>

    <p class="error-msg">你访问的页面不存在，或者已经被移动到别处。</p>

    <p class="error-sub">
      将在 <span class="countdown" id="countdown">5</span> 秒后自动返回
      <a href="https://daily.hiwd.com/">daily.hiwd.com</a>
    </p>

    <div class="error-actions">
      <a class="primary" href="https://daily.hiwd.com/">返回 daily 首页</a>
    </div>
  </div>

  <div id="footer">
    <div class="footer-meta">由 Claude + Web Search 自动生成</div>
    <div>© 2026 <a href="https://hiwd.com/">hiwd</a> · All rights reserved. <button class="theme-toggle" type="button" data-theme-toggle>夜间</button></div>
  </div>

  <script>
    (function () {
      var n = 5;
      var el = document.getElementById('countdown');
      var timer = setInterval(function () {
        n -= 1;
        if (el) el.textContent = n;
        if (n <= 0) {
          clearInterval(timer);
          window.location.href = 'https://daily.hiwd.com/';
        }
      }, 1000);
    })();
  </script>
</body>
</html>
