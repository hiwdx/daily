<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · 页面未找到 · hiwd</title>
  <meta name="description" content="页面未找到，即将跳转到 daily.hiwd.com" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Base — identical to hiwd style.css ── */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      background-color: #f5f5f5;
      color: #1a1a1a;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* ── Logo — fixed top-left, links to hiwd.com ── */
    #logo {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 9999;
      display: block;
      width: 100px;
      height: 100px;
      background-image: url('https://hiwd.com/img/logo.png');
      background-size: cover;
      background-repeat: no-repeat;
      outline: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Content card — same as hiwd #content ── */
    #content {
      margin-top: 80px;
      margin-left: auto;
      margin-right: auto;
      width: 90%;
      max-width: 800px;
      padding: 30px;
      background-color: #fff;
      box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      margin-bottom: 30px;
    }

    /* ── Headings — exact hiwd style ── */
    h1, h2, h3 {
      position: relative;
      padding-left: 15px;
      font-weight: bold;
      line-height: 1.2;
      color: #333;
    }
    h1::before {
      content: "";
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 4px; height: 26px;
      background-color: #00C2B3;
      border-radius: 2px;
    }
    h1 { font-size: 32px; margin-top: 0; }
    h2 { font-size: 24px; margin-top: 35px; }

    /* ── Body text & links — identical to hiwd ── */
    p {
      line-height: 1.7;
      margin-top: 10px;
      margin-bottom: 16px;
      color: #333;
    }
    a { color: #008F84; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.7; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      font-size: 13px;
      color: #999;
      padding-left: 15px;
      margin-bottom: 20px;
      display: block;
    }
    .breadcrumb a { color: #008F84; }

    /* ── 404 number ── */
    .error-code {
      font-size: 96px;
      font-weight: 700;
      color: #00C2B3;
      line-height: 1;
      padding-left: 15px;
      margin: 0 0 8px;
      letter-spacing: -2px;
    }

    /* ── Redirect bar ── */
    .redirect-bar {
      margin-top: 28px;
      padding: 14px 18px;
      background: #f9fefe;
      border-left: 3px solid rgba(0, 194, 179, 0.5);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: #555;
    }
    .redirect-bar a { font-weight: 600; }

    #countdown {
      font-weight: 700;
      color: #00a396;
    }

    /* ── Button ── */
    .go-btn {
      display: inline-block;
      margin-top: 22px;
      padding: 10px 26px;
      background-color: #00C2B3;
      color: #fff !important;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
      opacity: 1;
    }
    .go-btn:hover { opacity: 0.85; }

    /* ── Footer — same as hiwd footer.html ── */
    #footer {
      text-align: center;
      margin-top: 10px;
      padding: 20px;
      font-size: 12px;
      color: #999;
    }
    #footer a { color: #008F84; }

    /* ── Responsive — mirrors hiwd breakpoints ── */
    @media (max-width: 1150px) {
      #logo { position: absolute !important; top: 15px; left: 15px; width: 80px; height: 80px; }
      #content { margin-top: 110px; padding: 30px 25px; }
    }
    @media (max-width: 767px) {
      #content { margin-top: 110px; padding: 25px 18px; }
      .error-code { font-size: 72px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- Logo links back to hiwd main site -->
  <a href="https://hiwd.com/" id="logo" aria-label="返回 hiwd 主站"></a>

  <div id="content">

    <!-- Breadcrumb -->
    <span class="breadcrumb">
      <a href="https://hiwd.com/">hiwd</a> / 404
    </span>

    <p class="error-code">404</p>
    <h1>页面未找到</h1>

    <p>您访问的页面不存在，可能已被移动或删除。</p>

    <div class="redirect-bar">
      <span id="countdown">5</span> 秒后自动跳转到
      <a href="https://daily.hiwd.com/">daily.hiwd.com</a>
    </div>

    <a href="https://daily.hiwd.com/" class="go-btn">立即前往 daily.hiwd.com</a>

  </div>

  <div id="footer">
    © 2026 hiwd · All rights reserved. ·
    <a href="https://hiwd.com/">hiwd.com</a>
  </div>

  <script>
    (function () {
      var n = 5;
      var el = document.getElementById('countdown');
      var timer = setInterval(function () {
        n -= 1;
        if (el) el.textContent = n;
        if (n <= 0) {
          clearInterval(timer);
          window.location.href = 'https://daily.hiwd.com/';
        }
      }, 1000);
    })();
  </script>

</body>
</html>
