name: Agent Mail · Daily Digest

on:
  schedule:
    # GitHub Actions cron 在 UTC 整点 + 高峰期常延迟 5–30 分钟。
    # 三档发车 + state.last_digest_date 幂等：最先跑通的档发出去，后续档跳过。
    - cron: '35 0 * * *'   # 主档：UTC 00:35 → CST 08:35 (期望落点 09:00)
    - cron: '10 1 * * *'   # 兜底1：UTC 01:10 → CST 09:10
    - cron: '40 1 * * *'   # 兜底2：UTC 01:40 → CST 09:40
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD (空 = 今日 CST)"
        required: false
      dry_run:
        description: "true 时只生成 .eml 草稿，不真正发送"
        required: false
        default: 'false'
      force:
        description: "true 时忽略 state.last_digest_date 重发"
        required: false
        default: 'false'
      limit:
        description: "限制收件人数量 (0=不限)"
        required: false
        default: '0'

concurrency:
  group: agent-mail-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # agently-cli honours these
      AGENTLY_CLI_CONFIG_DIR: ${{ github.workspace }}/.agently
      MAIL_FROM: iworld@agent.qq.com
      MAIL_FROM_NAME: hiwd daily
      DIGEST_DATE: ${{ github.event.inputs.date }}
      DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run }}
      DIGEST_FORCE: ${{ github.event.inputs.force }}
      DIGEST_LIMIT: ${{ github.event.inputs.limit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agently-cli + keychain shim
        run: |
          npm install -g @tencent-qqmail/agently-cli
          agently-cli --version
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsecret-1-0 dbus-x11 gnome-keyring python3-secretstorage

      - name: Restore agently credentials
        env:
          AGENTLY_BOOTSTRAP_ENC_B64: ${{ secrets.AGENTLY_BOOTSTRAP_ENC_B64 }}
          AGENTLY_MASTER_KEY: ${{ secrets.AGENTLY_MASTER_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AGENTLY_BOOTSTRAP_ENC_B64:-}" ] || [ -z "${AGENTLY_MASTER_KEY:-}" ]; then
            echo "::error::AGENTLY_BOOTSTRAP_ENC_B64 or AGENTLY_MASTER_KEY not set"
            exit 1
          fi
          mkdir -p "$AGENTLY_CLI_CONFIG_DIR"
          chmod 700 "$AGENTLY_CLI_CONFIG_DIR"
          printf '%s' "$AGENTLY_BOOTSTRAP_ENC_B64" | base64 -d > "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc"
          chmod 600 "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc"
          echo "bootstrap_token.enc restored ($(wc -c < "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc") bytes)"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build digest arg string
        id: args
        run: |
          set -euo pipefail
          ARGS=""
          [ -n "${DIGEST_DATE:-}" ]  && ARGS="$ARGS --date $DIGEST_DATE"
          [ "${DIGEST_DRY_RUN:-}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${DIGEST_FORCE:-}" = "true" ]   && ARGS="$ARGS --force"
          if [ -n "${DIGEST_LIMIT:-}" ] && [ "${DIGEST_LIMIT}" != "0" ]; then
            ARGS="$ARGS --limit $DIGEST_LIMIT"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "computed args: $ARGS"

      - name: Dry-run digest (no CLI needed)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          DRY_RUN: '1'
        run: python scripts/digest.py ${{ steps.args.outputs.args }}

      - name: Refresh access token + send digest
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AGENTLY_MASTER_KEY: ${{ secrets.AGENTLY_MASTER_KEY }}
          DIGEST_ARGS: ${{ steps.args.outputs.args }}
        run: |
          set -euo pipefail
          # zalando/go-keyring (which agently-cli embeds) hardcodes the
          # SecretService "login" collection. `secret-tool store` writes to
          # the "default" alias, which on a fresh gnome-keyring is NOT
          # "login" — hence the earlier auth failure. Use python-secretstorage
          # to write directly to the login collection with the right
          # attributes.
          #
          # dbus-run-session gives us a session bus; gnome-keyring provides
          # the Secret Service that both python-secretstorage and go-keyring
          # talk to.
          # Use system python3 (not the actions/setup-python one) so that
          # the apt-installed python3-secretstorage is on sys.path.
          dbus-run-session -- bash -euxo pipefail -c '
            # Feed a known password to unlock. gnome-keyring will create a
            # fresh login collection with this password if one does not
            # exist yet, and leave it unlocked for the rest of the session.
            printf "ci\n" | gnome-keyring-daemon --unlock --components=secrets
            eval "$(printf "ci\n" | gnome-keyring-daemon --start --components=secrets)"
            export GNOME_KEYRING_CONTROL SSH_AUTH_SOCK

            /usr/bin/python3 scripts/ci_setup_keyring.py

            agently-cli auth refresh
            agently-cli auth status
            agently-cli +me

            python scripts/digest.py '"$DIGEST_ARGS"'
          '

      - name: Persist state.json
        # Only commit if state changed; never push drafts/.
        run: |
          git config user.name  "Agent Mail Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent_mail/state/state.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "chore(agent-mail): update digest state $(TZ=Asia/Shanghai date +'%F')"
            git pull --rebase -X ours origin ${{ github.ref_name }}
            git push
          fi

      - name: Upload drafts (dry-run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: drafts-${{ github.run_id }}
          path: agent_mail/drafts/*.eml
          if-no-files-found: ignore
          retention-days: 7
