name: Agent Mail · Daily Digest

on:
  schedule:
    - cron: '0 1 * * *'    # UTC 01:00 → CST 09:00
    - cron: '15 1 * * *'   # 兜底1：UTC 01:15 → CST 09:15
    - cron: '30 1 * * *'   # 兜底2：UTC 01:30 → CST 09:30
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD (空 = 今日 CST)"
        required: false
      dry_run:
        description: "true 时只生成 .eml 草稿，不真正发送"
        required: false
        default: 'false'
      force:
        description: "true 时忽略 state.last_digest_date 重发"
        required: false
        default: 'false'
      limit:
        description: "限制收件人数量 (0=不限)"
        required: false
        default: '0'

concurrency:
  group: agent-mail-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AGENTLY_CLI_CONFIG_DIR: ${{ github.workspace }}/.agently
      MAIL_FROM: iworld@agent.qq.com
      MAIL_FROM_NAME: hiwd daily
      DIGEST_DATE: ${{ github.event.inputs.date }}
      DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run }}
      DIGEST_FORCE: ${{ github.event.inputs.force }}
      DIGEST_LIMIT: ${{ github.event.inputs.limit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agently-cli
        run: |
          set -euo pipefail
          npm install -g @tencent-qqmail/agently-cli
          agently-cli --version

      - name: Restore agently credentials
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AGENTLY_CONFIG_TAR_B64: ${{ secrets.AGENTLY_CONFIG_TAR_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${AGENTLY_CONFIG_TAR_B64:-}" ]; then
            echo "::error::AGENTLY_CONFIG_TAR_B64 is not set. Run 'Agent Mail · One-time Linux Login' once, then save its output as this secret."
            exit 1
          fi
          mkdir -p "$AGENTLY_CLI_CONFIG_DIR"
          chmod 700 "$AGENTLY_CLI_CONFIG_DIR"
          printf '%s' "$AGENTLY_CONFIG_TAR_B64" | base64 -d > /tmp/agently-config.tgz
          tar -xzf /tmp/agently-config.tgz -C "$AGENTLY_CLI_CONFIG_DIR"
          find "$AGENTLY_CLI_CONFIG_DIR" -type d -exec chmod 700 {} +
          find "$AGENTLY_CLI_CONFIG_DIR" -type f -exec chmod 600 {} +
          echo "agently config restored into $AGENTLY_CLI_CONFIG_DIR"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify agently account
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          agently-cli auth refresh
          agently-cli auth status
          python scripts/check_agently_me.py "$MAIL_FROM"

      - name: Dry-run digest (no CLI send)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          DRY_RUN: '1'
        run: |
          set -euo pipefail
          ARGS=()
          [ -n "${DIGEST_DATE:-}" ]  && ARGS+=(--date "$DIGEST_DATE")
          ARGS+=(--dry-run)
          [ "${DIGEST_FORCE:-}" = "true" ]   && ARGS+=(--force)
          if [ -n "${DIGEST_LIMIT:-}" ] && [ "${DIGEST_LIMIT}" != "0" ]; then
            ARGS+=(--limit "$DIGEST_LIMIT")
          fi
          python scripts/digest.py "${ARGS[@]}"

      - name: Send digest via agently-cli
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          ARGS=()
          [ -n "${DIGEST_DATE:-}" ]  && ARGS+=(--date "$DIGEST_DATE")
          [ "${DIGEST_FORCE:-}" = "true" ]   && ARGS+=(--force)
          if [ -n "${DIGEST_LIMIT:-}" ] && [ "${DIGEST_LIMIT}" != "0" ]; then
            ARGS+=(--limit "$DIGEST_LIMIT")
          fi
          python scripts/digest.py "${ARGS[@]}"

      - name: Persist state.json
        if: ${{ always() }}
        run: |
          git config user.name  "Agent Mail Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent_mail/state/state.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "chore(agent-mail): update digest state $(TZ=Asia/Shanghai date +'%F')"
            git pull --rebase -X ours origin ${{ github.ref_name }}
            git push
          fi

      - name: Upload drafts (dry-run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: drafts-${{ github.run_id }}
          path: agent_mail/drafts/*.eml
          if-no-files-found: ignore
          retention-days: 7
