name: Agent Mail · Daily Digest

on:
  schedule:
    - cron: '35 0 * * *'   # 主档：UTC 00:35 → CST 08:35
    - cron: '10 1 * * *'   # 兜底1：UTC 01:10 → CST 09:10
    - cron: '40 1 * * *'   # 兜底2：UTC 01:40 → CST 09:40
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD (空 = 今日 CST)"
        required: false
      dry_run:
        description: "true 时只生成 .eml 草稿，不真正发送"
        required: false
        default: 'false'
      force:
        description: "true 时忽略 state.last_digest_date 重发"
        required: false
        default: 'false'
      limit:
        description: "限制收件人数量 (0=不限)"
        required: false
        default: '0'

concurrency:
  group: agent-mail-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AGENTLY_CLI_CONFIG_DIR: ${{ github.workspace }}/.agently
      MAIL_FROM: iworld@agent.qq.com
      MAIL_FROM_NAME: hiwd daily
      DIGEST_DATE: ${{ github.event.inputs.date }}
      DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run }}
      DIGEST_FORCE: ${{ github.event.inputs.force }}
      DIGEST_LIMIT: ${{ github.event.inputs.limit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agently-cli
        run: |
          npm install -g @tencent-qqmail/agently-cli
          agently-cli --version

      - name: Restore agently credentials (bootstrap only)
        env:
          AGENTLY_BOOTSTRAP_ENC_B64: ${{ secrets.AGENTLY_BOOTSTRAP_ENC_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${AGENTLY_BOOTSTRAP_ENC_B64:-}" ]; then
            echo "::error::AGENTLY_BOOTSTRAP_ENC_B64 not set"
            exit 1
          fi
          mkdir -p "$AGENTLY_CLI_CONFIG_DIR"
          chmod 700 "$AGENTLY_CLI_CONFIG_DIR"
          printf '%s' "$AGENTLY_BOOTSTRAP_ENC_B64" | base64 -d > "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc"
          chmod 600 "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc"
          echo "bootstrap_token.enc restored ($(wc -c < "$AGENTLY_CLI_CONFIG_DIR/bootstrap_token.enc") bytes)"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build digest arg string
        id: args
        run: |
          set -euo pipefail
          ARGS=""
          [ -n "${DIGEST_DATE:-}" ]  && ARGS="$ARGS --date $DIGEST_DATE"
          [ "${DIGEST_DRY_RUN:-}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${DIGEST_FORCE:-}" = "true" ]   && ARGS="$ARGS --force"
          if [ -n "${DIGEST_LIMIT:-}" ] && [ "${DIGEST_LIMIT}" != "0" ]; then
            ARGS="$ARGS --limit $DIGEST_LIMIT"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "computed args: $ARGS"

      - name: Dry-run digest (no CLI needed)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          DRY_RUN: '1'
        run: python scripts/digest.py ${{ steps.args.outputs.args }}

      - name: Diagnose Linux CLI (see what it needs beyond bootstrap_token.enc)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euxo pipefail
          echo "--- config dir before CLI run ---"
          ls -la "$AGENTLY_CLI_CONFIG_DIR/"

          echo "--- CLI binary ---"
          agently-cli --version
          which agently-cli
          # find the actual platform binary and dump strings around 'master.key'
          NM_ROOT=$(dirname "$(readlink -f "$(which agently-cli)")")/../lib/node_modules/@tencent-qqmail || true
          find "$NM_ROOT" -type f -name agently-cli 2>/dev/null | head -3
          BIN=$(find "$NM_ROOT" -type f -name agently-cli 2>/dev/null | grep linux | head -1 || echo "")
          if [ -n "$BIN" ]; then
            echo "--- linux binary: $BIN ---"
            file "$BIN" || true
            echo "--- master.key context in linux binary ---"
            strings -a "$BIN" | grep -B1 -A1 "master\.key" | head -40 || true
            echo "--- config-dir related strings ---"
            strings -a "$BIN" | grep -iE "AGENTLY_CLI|\.agently|master\.key\.file|/keyring|libsecret|gnome-keyring|secret_service|kdewallet" | sort -u | head -40 || true
          fi

          echo "--- auth status (fresh, only bootstrap present) ---"
          AGENTLY_CLI_DEBUG_HTTP=1 agently-cli auth status || true

          echo "--- auth refresh (fresh, only bootstrap present) ---"
          AGENTLY_CLI_DEBUG_HTTP=1 agently-cli auth refresh || true

          echo "--- config dir after CLI run (see what CLI wrote/looked for) ---"
          ls -laR "$AGENTLY_CLI_CONFIG_DIR/" || true

          echo "--- other candidate paths ---"
          for p in "$HOME/.config/agently" "$HOME/.config/agently-cli" "$HOME/.local/share/agently" "$HOME/.local/share/agently-cli" "$HOME/.agently"; do
            [ -e "$p" ] && ls -laR "$p" || echo "  $p: absent"
          done

          echo "::error::Diagnostic step — see above for what the Linux CLI actually needs"
          exit 1

      - name: Persist state.json
        run: |
          git config user.name  "Agent Mail Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent_mail/state/state.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "chore(agent-mail): update digest state $(TZ=Asia/Shanghai date +'%F')"
            git pull --rebase -X ours origin ${{ github.ref_name }}
            git push
          fi

      - name: Upload drafts (dry-run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: drafts-${{ github.run_id }}
          path: agent_mail/drafts/*.eml
          if-no-files-found: ignore
          retention-days: 7
