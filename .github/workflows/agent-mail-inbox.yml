name: Agent Mail · Inbox Poller

on:
  schedule:
    # Every 30 min — adjust if you want faster reaction time.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true 时只生成 .eml 草稿，不真正发送"
        required: false
        default: 'false'
      no_forward:
        description: "true 时跳过 3 天未读摘要转发"
        required: false
        default: 'false'

concurrency:
  group: agent-mail-inbox
  cancel-in-progress: true

jobs:
  inbox:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Poll inbox
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          PERSONAL_EMAIL: ${{ secrets.PERSONAL_EMAIL }}
          AUTO_SEND_PERSONAL: ${{ secrets.AUTO_SEND_PERSONAL }}
          FORWARD_IDLE_DAYS: ${{ secrets.FORWARD_IDLE_DAYS }}
        run: |
          ARGS=()
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "${{ github.event.inputs.no_forward }}" = "true" ]; then ARGS+=(--no-forward); fi
          python scripts/inbox_run.py "${ARGS[@]}"

      - name: Persist state.json + subscribers.json
        run: |
          git config user.name  "Agent Mail Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent_mail/state/state.json agent_mail/subscribers.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "chore(agent-mail): update inbox state"
            git pull --rebase -X ours origin ${{ github.ref_name }}
            git push
          fi
