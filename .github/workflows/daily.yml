name: Daily AI Briefing

on:
  schedule:
    # 每天北京时间 08:30 运行（UTC 00:30）
    - cron: '30 0 * * *'
  workflow_dispatch:    # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限以 push 生成的 HTML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name  "AI Briefing Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 只有文件真正变化时才 commit
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "📰 AI 简报 $(TZ=Asia/Shanghai date +'%Y-%m-%d')" &&
            git push
          )
