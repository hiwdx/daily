name: Daily AI Briefing

on:
  schedule:
    # 主任务：每天北京时间 08:30 运行（UTC 00:30）
    - cron: '30 0 * * *'
    # 补跑任务：每天北京时间 09:30 运行（UTC 01:30），主任务失败时兜底
    - cron: '30 1 * * *'
  workflow_dispatch:    # 手动触发：始终生成，不做幂等检查

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限以 push 生成的 HTML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # Re-run 时也拿最新 main，而非旧 SHA

      - name: Check if today's briefing already exists
        id: check
        run: |
          # 手动触发时始终生成，不做幂等检查
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 手动触发，跳过幂等检查，直接生成"
            exit 0
          fi

          TODAY=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          echo "今日日期（CST）: ${TODAY}"

          # 定时任务：用 archive.json 判断今日是否已生成
          if python3 -c "import json,sys; d=json.load(open('docs/archive.json')); sys.exit(0 if '${TODAY}' in [e.get('date','') for e in d] else 1)" 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 今日简报已存在（${TODAY}），跳过生成"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "⚠️  简报缺失（${TODAY}），开始生成"
          fi

      - name: Set up Python 3.11
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Generate daily briefing
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "AI Briefing Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 只有文件真正变化时才 commit
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "📰 AI 简报 $(TZ=Asia/Shanghai date +'%Y-%m-%d')" &&
            git pull --rebase -X theirs origin main &&
            git push
          )
