name: Daily AI Briefing

on:
  schedule:
    # 主任务：UTC 20:30（北京时间次日 04:30）
    # GitHub 调度器在 UTC 00:xx 高峰期通常延迟 3-4 小时，提前到此时段可让实际运行落在 CST 08:00 左右
    - cron: '30 20 * * *'
    # 兜底1：UTC 21:30（北京时间次日 05:30，延迟后约 CST 09:00）
    - cron: '30 21 * * *'
    # 兜底2：UTC 22:00（北京时间次日 06:00，延迟后约 CST 09:30）
    - cron: '0 22 * * *'
  workflow_dispatch:    # 手动触发：始终生成，不做幂等检查

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限以 push 生成的 HTML
      issues: write     # 需要写权限以在失败时创建告警 Issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # Re-run 时也拿最新 main，而非旧 SHA

      - name: Check if today's briefing already exists
        id: check
        run: |
          # 手动触发时始终生成，不做幂等检查
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 手动触发，跳过幂等检查，直接生成"
            exit 0
          fi

          TODAY=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          echo "今日日期（CST）: ${TODAY}"

          # 定时任务：用 archive.json 判断今日是否已生成
          if python3 -c "import json,sys; d=json.load(open('docs/archive.json')); sys.exit(0 if '${TODAY}' in [e.get('date','') for e in d] else 1)" 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 今日简报已存在（${TODAY}），跳过生成"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "⚠️  简报缺失（${TODAY}），开始生成"
          fi

      - name: Set up Python 3.11
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Generate daily briefing
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "AI Briefing Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 只有文件真正变化时才 commit
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "📰 AI 简报 $(TZ=Asia/Shanghai date +'%Y-%m-%d')" &&
            git pull --rebase -X theirs origin main &&
            git push
          )

      - name: Verify briefing and alert on missing
        # 仅定时触发时检查；用 always() 保证即使前面 step 失败，告警 step 仍会跑
        # （否则一旦 generate.py 抛异常，verify 自动 skip → issue 永远建不出来）
        if: always() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          if python3 -c "import json,sys; d=json.load(open('docs/archive.json')); sys.exit(0 if '${TODAY}' in [e.get('date','') for e in d] else 1)" 2>/dev/null; then
            echo "✅ 验证通过：${TODAY} 简报已存在"
          else
            echo "❌ 验证失败：${TODAY} 简报仍缺失，创建告警 Issue"
            EXISTING=$(gh issue list --label "briefing-missing" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "⚠️ 每日简报缺失：${TODAY}" \
                --body "定时任务已运行，但 **${TODAY}** 的简报仍未生成。请检查 [Actions 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 或手动触发 workflow。" \
                --label "briefing-missing"
            else
              echo "Issue #${EXISTING} 已存在，跳过重复创建"
            fi
            exit 1
          fi
