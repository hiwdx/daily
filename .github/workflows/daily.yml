name: Daily AI Briefing

on:
  schedule:
    # 主任务：每天北京时间 08:30 运行（UTC 00:30）
    - cron: '30 0 * * *'
    # 补跑任务：每天北京时间 09:30 运行（UTC 01:30），主任务失败时兜底
    - cron: '30 1 * * *'
  workflow_dispatch:    # 允许手动触发
    inputs:
      force:
        description: '强制重新生成（忽略幂等检查）'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限以 push 生成的 HTML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if today's briefing already exists
        id: check
        run: |
          TODAY=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          echo "今日日期（CST）: ${TODAY}"

          # 强制重新生成模式（手动触发时可选）
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 force=true，强制重新生成"
            exit 0
          fi

          # 用 archive.json 判断今日是否已生成
          if python3 -c "
import json, sys
try:
    data = json.load(open('docs/archive.json'))
    dates = [e.get('date','') for e in data]
    sys.exit(0 if '$TODAY' in dates else 1)
except:
    sys.exit(1)
          "; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 今日简报已存在（${TODAY}），跳过生成"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "⚠️  简报缺失（${TODAY}），开始生成"
          fi

      - name: Set up Python 3.11
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Generate daily briefing
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "AI Briefing Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 只有文件真正变化时才 commit
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "📰 AI 简报 $(TZ=Asia/Shanghai date +'%Y-%m-%d')" &&
            git pull --rebase origin main &&
            git push
          )
