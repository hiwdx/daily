name = "hiwd-mail"
main = "src/worker.js"
compatibility_date = "2026-06-01"
workers_dev = false

# Custom domain — wrangler will bind mail.hiwd.com (as a whole host) to this
# Worker and auto-create the required DNS record. Custom Domains route ALL
# traffic on that hostname to the Worker; wildcards / paths are not allowed
# in this mode (the Worker itself dispatches on url.pathname).
routes = [
  { pattern = "mail.hiwd.com", custom_domain = true },
]

# Non-secret config — committed to repo. Edit GITHUB_REPO if forking.
[vars]
GITHUB_REPO   = "ilivecom/daily"
GITHUB_BRANCH = "main"
FILE_PATH     = "agent_mail/subscribers.json"
FROM_EMAIL    = "iworld@agent.qq.com"
FROM_NAME     = "hiwd daily"
SITE_BASE     = "https://daily.hiwd.com"

# Secrets (set with `wrangler secret put NAME` — never committed):
#   GITHUB_TOKEN    : GitHub fine-grained PAT, "Contents: read & write" on ilivecom/daily
#   CONFIRM_SECRET  : any random string >= 32 chars (used for HMAC token signing)
#   RESEND_API_KEY  : optional; without it, subscribe is single-step (no double opt-in)
